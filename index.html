<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高機能カレンダーアプリ</title>
    <link rel="stylesheet" href="style.css?v=2">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>泉丘高校カレンダー</h1>
        
        <div class="form-section">
            <div class="form-row">
                <input type="date" id="todo-date" required>
                <input type="text" id="todo-title" placeholder="予定を入力" required>
                
                <select id="todo-color">
                    <option value="#e74c3c">⚠️ 課題（赤）</option>
                    <option value="#3498db">📖 予習・復習（青）</option>
                    <option value="#9b59b6">📝 小テスト（紫）</option>
                    <option value="#f1c40f">☕ その他（黄）</option>
                </select>
            </div>
            
            <div class="form-row flex-end">
                <label class="checkbox-label">
                    <input type="checkbox" id="is-weekly"> 毎週繰り返す (3ヶ月間)
                </label>
                <button id="add-btn">予定を追加</button>
                <button id="export-btn" style="background-color: #27ae60; margin-left: 10px;">📱 共有用QRコードを作成</button>
            </div>
        </div>

        <div class="main-layout">
            
            <div id="calendar-container">
                <div id="calendar"></div>
            </div>
            
            <div class="side-column">
                
                <div id="todo-list-container">
                    <h2>タスク・チェックリスト</h2>
                    <div class="task-tabs">
                        <button id="tab-week" class="task-tab active">直近1週間</button>
                        <button id="tab-today" class="task-tab">今日だけ</button>
                    </div>
                    <ul id="todo-list"></ul>
                </div>

                <div id="memo-list-container">
                    <h2>🎒 持ち物・メモ帳</h2>
                    <div class="memo-form">
                        <input type="text" id="memo-input" placeholder="持ち物やメモを入力...">
                        <button id="memo-add-btn">追加</button>
                    </div>
                    <ul id="memo-list"></ul>
                </div>

            </div> </div> </div> <div id="qr-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:9999; justify-content:center; align-items:center;">
        <div style="background:white; padding:30px; border-radius:10px; text-align:center; max-width:90%; box-shadow:0 4px 20px rgba(0,0,0,0.3);">
            <h3 style="margin-top:0; color:#2c3e50;">共有用QRコード</h3>
            <p style="font-size:13px; color:#555;">周りの人にこのQRコードをスマホのカメラで<br>読み取ってもらってください。一瞬で予定が同期されます！</p>
            <div id="qrcode" style="display:inline-block; margin:20px 0;"></div>
            <div>
                <button id="close-qr-btn" style="background-color:#7f8c8d; color:white; border:none; padding:8px 15px; border-radius:4px; cursor:pointer;">閉じる</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
